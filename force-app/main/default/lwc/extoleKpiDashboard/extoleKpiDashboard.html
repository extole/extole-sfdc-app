<template>
    <div class="kpi-dashboard-container" data-palette={palette}>
        <!-- Error banner for invalid token -->
        <template lwc:if={hasTokenError}>
            <div class="error-banner" role="alert">
                <lightning-icon icon-name="utility:error" size="small" variant="error" alternative-text="Error"></lightning-icon>
                <span>{labelTokenInvalid}</span>
            </div>
        </template>

        <!-- Loading spinner -->
        <template lwc:if={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- No snapshots + no configs: admin guided setup -->
        <template lwc:elseif={showAdminSetup}>
            <div class="empty-state">
                <lightning-icon icon-name="utility:settings" size="large" alternative-text="No reports configured"></lightning-icon>
                <p class="empty-state-text">{labelNoDataAdmin}</p>
                <lightning-button label="Go to Settings" variant="brand" onclick={handleGoToSettings}></lightning-button>
            </div>
        </template>

        <!-- No snapshots + configs exist: viewer ghost grid -->
        <template lwc:elseif={showViewerEmpty}>
            <div class="empty-state">
                <lightning-icon icon-name="utility:database" size="large" alternative-text="No data"></lightning-icon>
                <p class="empty-state-text">{labelNoDataViewer}</p>
            </div>
        </template>

        <!-- Tile grid -->
        <template lwc:else>
            <div class="palette-row">
                <div class="palette-bug-wrap">
                    <button type="button"
                            class={paletteBugClass}
                            title="Change palette"
                            aria-label="Change palette"
                            onclick={handleTogglePalettePopover}></button>
                    <template lwc:if={showPalettePopover}>
                        <div class="palette-popover">
                            <template for:each={paletteSwatches} for:item="sw">
                                <button key={sw.value}
                                        type="button"
                                        class={sw.cssClass}
                                        title={sw.label}
                                        aria-label={sw.label}
                                        data-palette={sw.value}
                                        onclick={handleSelectPalette}></button>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
            <div class="tile-grid">
                <template for:each={filteredSnapshots} for:item="snapshot">
                    <div key={snapshot.Id} class="tile-item" style={snapshot.tileStyle}>
                        <c-extole-tile snapshot={snapshot}></c-extole-tile>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>
