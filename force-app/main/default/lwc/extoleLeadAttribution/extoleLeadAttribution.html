<template>
    <!-- Disabled state -->
    <template lwc:if={isDisabled}>
        <div class="attribution-container">
            <div class="disabled-state">
                <lightning-illustration illustration-name="setup:no_access" alternative-text="Lead Attribution disabled" size="small"></lightning-illustration>
                <p class="disabled-text">{labelDisabled}</p>
            </div>
        </div>
    </template>

    <!-- Active state -->
    <template lwc:else>
        <div class="attribution-container">
            <div class="attribution-header">
                <h1 class="attribution-title">{labelTitle}</h1>
                <template lwc:if={trackingSinceText}>
                    <span class="tracking-since">{trackingSinceText}</span>
                </template>
            </div>

            <template lwc:if={isLoading}>
                <div class="spinner-container">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <template lwc:else>
                <template lwc:if={hasData}>
                    <lightning-layout multiple-rows="true" pull-to-boundary="small">
                        <!-- RAF Leads Created -->
                        <lightning-layout-item size="12" medium-device-size="6" large-device-size="4" padding="around-small">
                            <div class="metric-tile">
                                <div class="metric-label">{labelRAFLeads}</div>
                                <div class="metric-value">{formattedLeadCount}</div>
                            </div>
                        </lightning-layout-item>

                        <!-- RAF Lead Conversion Rate -->
                        <lightning-layout-item size="12" medium-device-size="6" large-device-size="4" padding="around-small">
                            <div class="metric-tile">
                                <div class="metric-label">{labelConversionRate}</div>
                                <div class="metric-value">{formattedConversionRate}</div>
                            </div>
                        </lightning-layout-item>

                        <!-- Pipeline Value -->
                        <lightning-layout-item size="12" medium-device-size="6" large-device-size="4" padding="around-small">
                            <div class="metric-tile">
                                <div class="metric-label">{labelPipelineValue}</div>
                                <div class="metric-value">{formattedPipelineValue}</div>
                            </div>
                        </lightning-layout-item>
                    </lightning-layout>
                </template>

                <template lwc:else>
                    <div class="empty-state">
                        <lightning-illustration illustration-name="no_data:no_data" alternative-text="No leads" size="small"></lightning-illustration>
                        <p class="empty-text">{labelNoLeads}</p>
                    </div>
                </template>
            </template>
        </div>
    </template>
</template>
