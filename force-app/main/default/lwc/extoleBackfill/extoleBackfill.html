<template>
    <div class="backfill-container">

        <!-- Object -->
        <div class="settings-card">
            <div class="card-title-row">
                <div class="settings-card-title">Object</div>
                <lightning-helptext content="Choose whether to create share links for Contacts or Leads. This selection also determines which fields are available below."></lightning-helptext>
            </div>
            <div class="slds-form-element__control radio-group-spaced">
                <span class="slds-radio radio-with-desc">
                    <input type="radio" name="objectType" id="radio-contact"
                           value="Contact" checked={isContact} onchange={handleObjectRadioChange} />
                    <label class="slds-radio__label" for="radio-contact">
                        <span class="slds-radio_faux"></span>
                        <span class="slds-form-element__label">Contacts</span>
                    </label>
                    <p class="radio-desc">Contacts with an email address</p>
                </span>
                <span class="slds-radio radio-with-desc">
                    <input type="radio" name="objectType" id="radio-lead"
                           value="Lead" checked={isLead} onchange={handleObjectRadioChange} />
                    <label class="slds-radio__label" for="radio-lead">
                        <span class="slds-radio_faux"></span>
                        <span class="slds-form-element__label">Leads</span>
                    </label>
                    <p class="radio-desc">Unconverted leads with an email address</p>
                </span>
            </div>
        </div>

        <!-- Audience -->
        <div class="settings-card">
            <div class="card-title-row">
                <div class="settings-card-title">Audience</div>
                <lightning-helptext content="Choose which records to process. All three options scale to any org size except Report, which is capped at 2,000 rows."></lightning-helptext>
            </div>
            <div class="slds-form-element__control radio-group-spaced">
                <span class="slds-radio radio-with-desc">
                    <input type="radio" name="audienceType" id="radio-default"
                           value="default" checked={isDefaultFilter} onchange={handleAudienceRadioChange} />
                    <label class="slds-radio__label" for="radio-default">
                        <span class="slds-radio_faux"></span>
                        <span class="slds-form-element__label">Closed/Won opps</span>
                        <span class="radio-desc">{defaultFilterDescription}</span>
                    </label>
                </span>
                <span class="slds-radio radio-with-desc">
                    <input type="radio" name="audienceType" id="radio-date"
                           value="date" checked={isDateFilter} onchange={handleAudienceRadioChange} />
                    <label class="slds-radio__label" for="radio-date">
                        <span class="slds-radio_faux"></span>
                        <span class="slds-form-element__label">Created after date</span>
                        <span class="radio-desc">{dateFilterDescription}</span>
                    </label>
                    <template lwc:if={isDateFilter}>
                        <div class="radio-nested-input">
                            <lightning-input
                                type="date"
                                label="Created on or after"
                                value={selectedDate}
                                onchange={handleDateChange}>
                            </lightning-input>
                        </div>
                    </template>
                </span>
                <span class="slds-radio radio-with-desc">
                    <input type="radio" name="audienceType" id="radio-report"
                           value="report" checked={isReportFilter} onchange={handleAudienceRadioChange} />
                    <label class="slds-radio__label" for="radio-report">
                        <span class="slds-radio_faux"></span>
                        <span class="slds-form-element__label">Salesforce Report</span>
                        <span class="radio-desc">Use a saved report to target a specific audience (max 2,000 rows)</span>
                    </label>
                    <template lwc:if={isReportFilter}>
                        <div class="radio-nested-input">
                            <c-searchable-combobox
                                label="Select a report"
                                value={selectedReportId}
                                options={reportOptions}
                                placeholder="Search reports..."
                                onchange={handleReportChange}
                                onsearch={handleReportSearch}>
                            </c-searchable-combobox>
                        </div>
                    </template>
                </span>
            </div>
        </div>

        <!-- Campaign -->
        <div class="settings-card">
            <div class="card-title-row">
                <div class="settings-card-title">Campaign</div>
                <lightning-helptext content="The Extole campaign to generate share links for. Leave blank to use the default campaign."></lightning-helptext>
            </div>
            <template lwc:if={isLoadingCampaigns}>
                <lightning-spinner size="small" alternative-text="Loading campaigns..."></lightning-spinner>
            </template>
            <template lwc:else>
                <lightning-combobox
                    name="program"
                    label="Campaign (optional)"
                    value={selectedProgram}
                    options={campaignOptionsWithNone}
                    onchange={handleProgramChange}>
                </lightning-combobox>
            </template>
        </div>

        <!-- Share Link Field -->
        <div class="settings-card">
            <div class="card-title-row">
                <div class="settings-card-title">Share Link Field</div>
                <lightning-helptext content="The field where the generated share link will be written. Shows custom text and URL fields on the selected object only."></lightning-helptext>
            </div>
            <template lwc:if={isLoadingFields}>
                <lightning-spinner size="small" alternative-text="Loading fields..."></lightning-spinner>
            </template>
            <template lwc:else>
                <template lwc:if={hasFieldOptions}>
                    <c-searchable-combobox
                        label={shareLinkFieldLabel}
                        value={selectedField}
                        options={fieldOptions}
                        placeholder="Search fields..."
                        onchange={handleFieldChange}>
                    </c-searchable-combobox>
                </template>
                <template lwc:else>
                    <p class="empty-text">
                        No custom Text or URL fields found on {selectedObject}.
                        Create one first, then return here to select it.
                    </p>
                </template>
            </template>
        </div>

        <!-- Actions -->
        <div class="settings-card action-card">
            <div class="action-row">
                <lightning-button
                    label="Create Share Links"
                    variant="brand"
                    icon-name="utility:upload"
                    onclick={handleRunClick}
                    disabled={isRunDisabled}>
                </lightning-button>
                <template lwc:if={isCountingForRun}>
                    <lightning-spinner size="small" alternative-text="Calculating..."></lightning-spinner>
                </template>
            </div>
        </div>

        <!-- Share Link Log -->
        <div class="settings-card">
            <div class="section-header-row diag-header-row">
                <div class="diag-subsection-label">
                    <div class="settings-card-title">Share Link Log</div>
                    <lightning-helptext content="Each row is one Create Share Links run. Details shows a summary of any errors."></lightning-helptext>
                </div>
                <div class="diag-header-actions">
                    <template lwc:if={confirmClearLogs}>
                        <span class="confirm-clear-label">Clear all log entries?</span>
                        <lightning-button label="Yes, clear" variant="destructive" onclick={handleConfirmClearLogs} disabled={isClearingLogs}></lightning-button>
                        <lightning-button label="Cancel" variant="neutral" onclick={handleCancelClearLogs}></lightning-button>
                    </template>
                    <template lwc:else>
                        <lightning-button label="Refresh" variant="neutral" icon-name="utility:refresh" onclick={handleRefreshLogs}></lightning-button>
                        <lightning-button label="Copy as Markdown" variant="neutral" icon-name="utility:copy" onclick={handleCopyLogMd}></lightning-button>
                        <lightning-button label="Clear Log" variant="destructive-text" onclick={handleClearLogs} disabled={isClearingLogs}></lightning-button>
                    </template>
                </div>
            </div>
            <template lwc:if={isLoadingLogs}>
                <lightning-spinner size="small" alternative-text="Loading..."></lightning-spinner>
            </template>
            <template lwc:elseif={hasLogs}>
                <div class="run-history-table">
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col"><div class="slds-truncate">Started</div></th>
                                <th scope="col"><div class="slds-truncate">Object</div></th>
                                <th scope="col"><div class="slds-truncate">Audience</div></th>
                                <th scope="col"><div class="slds-truncate">Campaign</div></th>
                                <th scope="col"><div class="slds-truncate">Field</div></th>
                                <th scope="col"><div class="slds-truncate">Status</div></th>
                                <th scope="col"><div class="slds-truncate">Total</div></th>
                                <th scope="col"><div class="slds-truncate">Success</div></th>
                                <th scope="col"><div class="slds-truncate">Errors</div></th>
                                <th scope="col"><div class="slds-truncate">Details</div></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={logs} for:item="log">
                                <tr key={log.Id}>
                                    <td>{log.formattedStarted}</td>
                                    <td>{log.Object_Type__c}</td>
                                    <td class="truncated-cell" title={log.Audience_Criteria__c}>{log.Audience_Type__c}</td>
                                    <td>{log.Program_Label__c}</td>
                                    <td>{log.Target_Field__c}</td>
                                    <td>
                                        <span class={log.statusClass}>{log.statusLabel}</span>
                                        <template lwc:if={log.isInProgress}>
                                            <lightning-spinner size="x-small" alternative-text="Running..."></lightning-spinner>
                                        </template>
                                    </td>
                                    <td>{log.Total_Count__c}</td>
                                    <td>{log.Success_Count__c}</td>
                                    <td>{log.Error_Count__c}</td>
                                    <td class={log.detailClass} title={log.Error_Detail__c}>{log.errorDetail}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template lwc:else>
                <p class="empty-text">No share link creation runs yet.</p>
            </template>
        </div>

    </div>

    <!-- Confirmation Modal -->
    <template lwc:if={showConfirmModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__header">
                    <h2 class="slds-modal__title">Confirm Share Link Creation</h2>
                    <button class="slds-button slds-button_icon slds-modal__close" onclick={handleCancel}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                </div>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>{confirmMessage}</p>
                    <p class="confirm-note">Continuing will overwrite any existing value in that field.</p>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" variant="neutral" onclick={handleCancel}></lightning-button>
                    <lightning-button
                        label="Continue"
                        variant="brand"
                        class="slds-m-left_x-small"
                        onclick={handleConfirm}
                        disabled={isRunning}>
                    </lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
