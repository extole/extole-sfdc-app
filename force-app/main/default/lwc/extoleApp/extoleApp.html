<template>
    <div class="app-shell">
        <!-- App header with Extole logo -->
        <div class="app-header">
            <div class="app-logo" aria-label="Extole">
                <svg width="100" height="28" viewBox="0 0 100 28" aria-hidden="true">
                    <rect width="100" height="28" rx="4" fill="#1D9E75"/>
                    <text x="10" y="20" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">extole</text>
                </svg>
            </div>
        </div>

        <!-- Loading state -->
        <template lwc:if={isLoading}>
            <div class="init-loading">
                <lightning-spinner alternative-text="Loading Extole App..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Onboarding flow -->
        <template lwc:elseif={showOnboarding}>
            <c-extole-onboarding onboardingcomplete={handleOnboardingComplete}></c-extole-onboarding>
        </template>

        <!-- Main app with tabs -->
        <template lwc:else>
            <lightning-tabset variant="standard" active-tab-value={activeTab} onactive={handleTabChange}>
                <!-- Program Overview tab -->
                <lightning-tab label={labelTabOverview} value="overview">
                    <c-extole-program-overview onnavigatetosettings={handleNavigateToSettings}></c-extole-program-overview>
                </lightning-tab>

                <!-- Lead Attribution tab (conditional) -->
                <template lwc:if={showLeadAttribution}>
                    <lightning-tab label={labelTabLeadAttribution} value="leads">
                        <c-extole-lead-attribution></c-extole-lead-attribution>
                    </lightning-tab>
                </template>

                <!-- Settings tab -->
                <lightning-tab label={labelTabSettings} value="settings">
                    <c-extole-settings></c-extole-settings>
                </lightning-tab>
            </lightning-tabset>
        </template>
    </div>
</template>
