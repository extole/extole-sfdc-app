<template>
    <template lwc:if={isLoading}>
        <div class="loading-row">
            <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
        </div>
    </template>

    <template lwc:elseif={shouldRender}>
        <div class="person-card">

            <!-- Header: avatar + name + role -->
            <div class="card-header">
                <div class="avatar avatar-lg">
                    <span class="avatar-initials">{initials}</span>
                </div>
                <div class="header-text">
                    <div class="header-name">{displayName}</div>
                    <template lwc:if={roleLabel}>
                        <div class="header-role">{roleLabel}</div>
                    </template>
                </div>
            </div>

            <!-- Referred-by (friend mode) -->
            <template lwc:if={hasReferredBy}>
                <div class="section">
                    <div class="section-header" data-section="referredBy" onclick={toggleSection}>
                        <lightning-icon icon-name={referredByChevron} size="xx-small" class="section-chevron"></lightning-icon>
                        <span class="section-label">Referred by</span>
                    </div>
                    <template lwc:if={referredByExpanded}>
                        <div class="section-body">
                            <div class="referred-by-row">
                                <span class="program-pill" style={referredByDecorated.programStyle}>program: {referredByDecorated.program}</span>
                                <template lwc:if={referredByDecorated.isLinked}>
                                    <a href={referredByDecorated.sfdcUrl} class="record-link">{referredByDecorated.displayName}</a>
                                </template>
                                <template lwc:else>
                                    <span class="plain-email">{referredByDecorated.displayName}</span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Share links -->
            <template lwc:if={hasShareLinks}>
                <div class="section">
                    <div class="section-header" data-section="shareLinks" onclick={toggleSection}>
                        <lightning-icon icon-name={shareLinksChevron} size="xx-small" class="section-chevron"></lightning-icon>
                        <span class="section-label">{shareLinksLabel}</span>
                    </div>
                    <template lwc:if={shareLinksExpanded}>
                        <div class="section-body">
                            <template for:each={decoratedShareLinks} for:item="sl">
                                <div key={sl.code} class="share-link-row">
                                    <template lwc:if={sl.program}>
                                        <span class="program-pill" style={sl.programStyle}>program: {sl.program}</span>
                                    </template>
                                    <template lwc:else>
                                        <span></span>
                                    </template>
                                    <span class="share-link-url">
                                        {sl.link}
                                        <template lwc:if={sl.isSavedOnRecord}>
                                            <span class="saved-marker" title="This link is saved on the record">saved on record</span>
                                        </template>
                                    </span>
                                    <button class="copy-btn" data-link={sl.link} onclick={handleCopyLink} title="Copy link">
                                        <lightning-icon icon-name="utility:copy" size="x-small"></lightning-icon>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Friends grouped by program -->
            <template lwc:if={hasFriends}>
                <div class="section">
                    <div class="section-header" data-section="friends" onclick={toggleSection}>
                        <lightning-icon icon-name={friendsChevron} size="xx-small" class="section-chevron"></lightning-icon>
                        <span class="section-label">{friendsLabel}</span>
                    </div>
                    <template lwc:if={friendsExpanded}>
                        <div class="section-body friends-body">
                            <template for:each={programGroups} for:item="g">
                                <div key={g.program} class="program-group">
                                    <span class="program-pill" style={g.programStyle}>program: {g.program}</span>
                                    <template for:each={g.engagements} for:item="eng">
                                        <div key={eng.key} class="engagement-card">
                                            <div class={eng.headerClass} data-key={eng.key} onclick={toggleEngagement}>
                                                <div class="engagement-chevron-slot">
                                                    <template lwc:if={eng.toggleable}>
                                                        <lightning-icon icon-name={eng.chevronName} size="xx-small" class="engagement-chevron"></lightning-icon>
                                                    </template>
                                                </div>
                                                <div class={eng.avatarClass}>
                                                    <template lwc:if={eng.avatarIsEarned}>
                                                        <lightning-icon icon-name="utility:check" size="x-small" variant="inverse"></lightning-icon>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="avatar-initials">{eng.avatarInitials}</span>
                                                    </template>
                                                </div>
                                                <div class="engagement-identity">
                                                    <template lwc:if={eng.isLinked}>
                                                        <a href={eng.sfdcUrl} class="engagement-name record-link">{eng.displayName}</a>
                                                    </template>
                                                    <template lwc:else>
                                                        <span class="engagement-name">{eng.displayName}</span>
                                                    </template>
                                                    <template lwc:if={eng.statusText}>
                                                        <div class="engagement-status">{eng.statusText}</div>
                                                    </template>
                                                </div>
                                                <span class={eng.rewardStateClass}>{eng.rewardStateText}</span>
                                            </div>
                                            <template lwc:if={eng.showMilestones}>
                                                <div class="milestone-list">
                                                    <template for:each={eng.milestones} for:item="m">
                                                        <div key={m.name} class={m.rowClass}>
                                                            <span class="milestone-bullet"></span>
                                                            <span class="milestone-label">{m.displayName}</span>
                                                            <template lwc:if={m.dateStr}>
                                                                <span class="milestone-date">{m.dateStr}</span>
                                                            </template>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </template>

    <template lwc:if={loadError}>
        <div class="error-banner">{loadError}</div>
    </template>
</template>
