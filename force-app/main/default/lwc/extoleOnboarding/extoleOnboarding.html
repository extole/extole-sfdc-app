<template>
    <div class="onboarding-container">
        <!-- Logo / Branding -->
        <div class="onboarding-logo">
            <svg width="120" height="32" viewBox="0 0 120 32" aria-label="Extole">
                <rect width="120" height="32" rx="4" fill="#1D9E75"/>
                <text x="12" y="22" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">extole</text>
            </svg>
        </div>

        <!-- Progress stepper -->
        <div class="stepper" role="list">
            <div class={step1Class} role="listitem">
                <div class="step-circle">
                    <template lwc:if={isStep1Done}>
                        <lightning-icon icon-name="utility:check" size="x-small" alternative-text="Done"></lightning-icon>
                    </template>
                    <template lwc:else>
                        <span>1</span>
                    </template>
                </div>
                <span class="step-label">{labelStep1}</span>
            </div>
            <div class="step-connector"></div>
            <div class={step2Class} role="listitem">
                <div class="step-circle">
                    <template lwc:if={isStep2Done}>
                        <lightning-icon icon-name="utility:check" size="x-small" alternative-text="Done"></lightning-icon>
                    </template>
                    <template lwc:else>
                        <span>2</span>
                    </template>
                </div>
                <span class="step-label">{labelStep2}</span>
            </div>
            <div class="step-connector"></div>
            <div class={step3Class} role="listitem">
                <div class="step-circle"><span>3</span></div>
                <span class="step-label">{labelStep3}</span>
            </div>
        </div>

        <!-- Step content card -->
        <lightning-card>
            <!-- Step 1: Connect -->
            <template lwc:if={isCurrentStep1}>
                <div class="step-body">
                    <h2 class="step-title">{labelStep1}</h2>
                    <p class="step-desc">{labelStep1Desc}</p>

                    <a href="/lightning/setup/NamedCredential/home" target="_blank" rel="noopener noreferrer" class="setup-link">
                        <lightning-icon icon-name="utility:new_window" size="x-small" alternative-text="Open"></lightning-icon>
                        {labelGoToSetup}
                    </a>

                    <div class="connect-action-row">
                        <lightning-button
                            label={labelTestConnection}
                            variant="brand"
                            onclick={handleTestConnection}
                            disabled={isTesting}
                        ></lightning-button>
                        <template lwc:if={isTesting}>
                            <lightning-spinner size="small" alternative-text="Testing..."></lightning-spinner>
                        </template>
                    </div>

                    <template lwc:if={connectionResult}>
                        <div class={connectionResultClass}>
                            <template lwc:if={connectionResult.success}>
                                Connected! {connectionResult.reportCount} {labelReportCount}
                            </template>
                            <template lwc:else>
                                {connectionResult.errorMessage}
                            </template>
                        </div>
                    </template>

                    <div class="step-footer">
                        <lightning-button
                            label="Next"
                            variant="brand"
                            onclick={handleStep1Next}
                            disabled={isNotConnected}
                        ></lightning-button>
                    </div>
                </div>
            </template>

            <!-- Step 2: Configure first report -->
            <template lwc:if={isCurrentStep2}>
                <div class="step-body">
                    <h2 class="step-title">{labelStep2}</h2>
                    <p class="step-desc">{labelStep2Desc}</p>

                    <template lwc:if={isLoadingReportTypes}>
                        <div class="spinner-container">
                            <lightning-spinner size="medium" alternative-text="Loading report types..."></lightning-spinner>
                        </div>
                    </template>

                    <template lwc:else>
                        <div class="report-picker-table">
                            <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                                <thead>
                                    <tr>
                                        <th scope="col"><div class="slds-truncate">Report Name</div></th>
                                        <th scope="col"><div class="slds-truncate">Description</div></th>
                                        <th scope="col"><div class="slds-truncate">Type</div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={filteredReportTypes} for:item="rt">
                                        <tr key={rt.report_type_id} class={rt.rowClass} onclick={handleSelectReport} data-id={rt.report_type_id}>
                                            <td>
                                                {rt.display_name}
                                                <template lwc:if={rt.isSql}>
                                                    <span class="fast-badge">Fast</span>
                                                </template>
                                            </td>
                                            <td class="desc-cell">{rt.description}</td>
                                            <td>{rt.type}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <div class="step-footer">
                        <lightning-button label="Back" variant="neutral" onclick={handleStep2Back}></lightning-button>
                        <lightning-button
                            label="Next"
                            variant="brand"
                            onclick={handleStep2Next}
                            disabled={noReportTypeSelected}
                        ></lightning-button>
                    </div>
                </div>
            </template>

            <!-- Step 3: Run first sync -->
            <template lwc:if={isCurrentStep3}>
                <div class="step-body">
                    <h2 class="step-title">{labelStep3}</h2>
                    <p class="step-desc">{labelStep3Desc}</p>

                    <div class="sync-action-row">
                        <lightning-button
                            label={labelSyncNow}
                            variant="brand"
                            icon-name="utility:refresh"
                            onclick={handleRunSync}
                            disabled={isSyncing}
                        ></lightning-button>
                        <template lwc:if={isSyncing}>
                            <lightning-spinner size="small" alternative-text="Syncing..."></lightning-spinner>
                        </template>
                    </div>

                    <template lwc:if={syncComplete}>
                        <div class="sync-success">
                            <lightning-icon icon-name="utility:success" size="small" alternative-text="Success" variant="success"></lightning-icon>
                            Sync complete! Your dashboard is ready.
                        </div>
                        <div class="step-footer">
                            <lightning-button
                                label="Go to Dashboard"
                                variant="brand"
                                onclick={handleFinish}
                            ></lightning-button>
                        </div>
                    </template>

                    <div class="step-footer-back">
                        <lightning-button label="Back" variant="neutral" onclick={handleStep3Back}></lightning-button>
                    </div>
                </div>
            </template>
        </lightning-card>
    </div>
</template>
