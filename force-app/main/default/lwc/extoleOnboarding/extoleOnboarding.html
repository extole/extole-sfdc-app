<template>
    <div class="onboarding-container">
        <div class="onboarding-logo">
            <svg width="120" height="32" viewBox="0 0 120 32" aria-label="Extole">
                <rect width="120" height="32" rx="4" fill="#1D9E75"/>
                <text x="12" y="22" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">extole</text>
            </svg>
        </div>

        <lightning-card title="Getting Started">
            <div class="setup-body">
                <p class="setup-intro">Installation complete. Complete these two steps to finish connecting Salesforce to your Extole program.</p>

                <ol class="setup-steps">
                    <li class="setup-step">
                        <div class="step-number">1</div>
                        <div class="step-content">
                            <div class="step-heading">Test your API connection</div>
                            <p class="step-desc">Go to Settings and click <strong>Test Connection</strong> to verify your Extole API credential is working.</p>
                        </div>
                    </li>

                    <li class="setup-step">
                        <div class="step-number">2</div>
                        <div class="step-content">
                            <div class="step-heading">Add your first KPI</div>
                            <p class="step-desc">In Settings, add a report configuration under <strong>Report Configuration</strong>. Your KPI dashboard will populate once the first sync completes.</p>
                        </div>
                    </li>
                </ol>

                <div class="setup-footer">
                    <lightning-button
                        label="Go to Settings"
                        variant="brand"
                        icon-name="utility:settings"
                        onclick={handleGoToSettings}
                    ></lightning-button>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
