<template>
    <div class="overview-container">
        <!-- Error banner for invalid token -->
        <template lwc:if={hasTokenError}>
            <div class="error-banner" role="alert">
                <lightning-icon icon-name="utility:error" size="small" variant="error" alternative-text="Error"></lightning-icon>
                <span>{labelTokenInvalid}</span>
            </div>
        </template>

        <!-- Header with range toggle -->
        <div class="overview-header">
            <h1 class="overview-title">{labelTitle}</h1>
            <div class="range-toggle" role="group" aria-label="Date range">
                <button
                    class={btnClassRolling30}
                    data-range="Rolling 30"
                    onclick={handleRangeChange}
                >{labelRolling30}</button>
                <button
                    class={btnClassRolling90}
                    data-range="Rolling 90"
                    onclick={handleRangeChange}
                >{labelRolling90}</button>
                <button
                    class={btnClassYTD}
                    data-range="YTD"
                    onclick={handleRangeChange}
                >{labelYTD}</button>
            </div>
        </div>

        <!-- Loading spinner -->
        <template lwc:if={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- No snapshots + no configs: admin guided setup -->
        <template lwc:elseif={showAdminSetup}>
            <div class="empty-state">
                <lightning-illustration illustration-name="setup:no_content" alternative-text="No reports configured" size="small"></lightning-illustration>
                <p class="empty-state-text">{labelNoDataAdmin}</p>
                <lightning-button label="Go to Settings" variant="brand" onclick={handleGoToSettings}></lightning-button>
            </div>
        </template>

        <!-- No snapshots + no configs: viewer ghost grid -->
        <template lwc:elseif={showViewerEmpty}>
            <div class="empty-state">
                <lightning-illustration illustration-name="no_data:no_data" alternative-text="No data" size="small"></lightning-illustration>
                <p class="empty-state-text">{labelNoDataViewer}</p>
            </div>
        </template>

        <!-- Tile grid -->
        <template lwc:else>
            <lightning-layout multiple-rows="true" pull-to-boundary="small">
                <template for:each={filteredSnapshots} for:item="snapshot">
                    <lightning-layout-item
                        key={snapshot.Id}
                        size="12"
                        medium-device-size="6"
                        large-device-size="4"
                        padding="around-small"
                    >
                        <c-extole-tile snapshot={snapshot}></c-extole-tile>
                    </lightning-layout-item>
                </template>
            </lightning-layout>

            <template lwc:if={hasNoSnapshotsForRange}>
                <div class="no-range-data">
                    <p>{labelNoPending}</p>
                </div>
            </template>
        </template>
    </div>
</template>
