<template>
    <div class="settings-container">
        <div class="settings-card">
            <div class="settings-card-header">
                <div class="settings-card-title">
                    Webhook Endpoint
                    <lightning-helptext
                        content="Extole posts events to this URL. Configure a webhook in the Extole component with this URL and the OAuth 2.0 credentials from your Connected App."
                    ></lightning-helptext>
                </div>
            </div>
            <div class="endpoint-row">
                <span class="endpoint-url">{endpointUrl}</span>
                <lightning-button-icon
                    icon-name="utility:copy"
                    variant="bare"
                    size="small"
                    alternative-text="Copy endpoint URL"
                    title="Copy to clipboard"
                    onclick={handleCopyEndpoint}
                ></lightning-button-icon>
            </div>
            <div class="setup-steps">
                <p class="setup-step">
                    <strong>1. Create a Connected App</strong> in Setup → App
                    Manager. Enable OAuth, add the
                    <em
                        >Perform requests at any time (refresh_token,
                        offline_access)</em
                    >
                    scope and the
                    <em>Access and manage your data (api)</em> scope. Use Client
                    Credentials flow.
                </p>
                <p class="setup-step">
                    <strong>2. In the Extole component</strong>, add the
                    Connected App's Consumer Key and Secret as the
                    <code>CLIENT_KEY</code> setting, and set the endpoint URL
                    above as the webhook target.
                </p>
                <p class="setup-step">
                    <strong>3. Add writeback rules below</strong> to map
                    incoming event fields to Contact or Lead fields.
                </p>
            </div>
        </div>

        <div class="settings-card">
            <div class="settings-card-header">
                <div class="settings-card-title">
                    Rules
                    <lightning-helptext
                        content="Each rule maps an Extole event to a Salesforce object and defines which event data fields get written to which SFDC fields."
                    ></lightning-helptext>
                </div>
                <div class="diag-header-actions">
                    <lightning-button
                        label="Refresh"
                        variant="neutral"
                        icon-name="utility:refresh"
                        onclick={handleRefreshConfigs}
                    ></lightning-button>
                    <lightning-button
                        label="Add Rule"
                        variant="brand"
                        icon-name="utility:add"
                        onclick={handleAddRule}
                    ></lightning-button>
                </div>
            </div>

            <template lwc:if={isLoadingConfigs}>
                <lightning-spinner
                    size="small"
                    alternative-text="Loading rules..."
                ></lightning-spinner>
            </template>
            <template lwc:else>
                <template lwc:if={hasConfigs}>
                    <div class="rules-table-wrapper">
                        <table
                            class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped"
                        >
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">Event Name</th>
                                    <th scope="col">Object</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Field Mappings</th>
                                    <th scope="col">Description</th>
                                    <th scope="col"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={configs} for:item="config">
                                    <tr key={config.Id}>
                                        <td class="event-name-cell">
                                            {config.Event_Name__c}
                                        </td>
                                        <td>{config.Object_Type__c}</td>
                                        <td>
                                            <span
                                                class={config.statusBadgeClass}
                                                >{config.Status__c}</span
                                            >
                                        </td>
                                        <td>{config.mappingCount}</td>
                                        <td
                                            class="description-cell"
                                            title={config.Description__c}
                                        >
                                            {config.Description__c}
                                        </td>
                                        <td class="col-actions">
                                            <lightning-button-menu
                                                icon-name="utility:down"
                                                variant="bare"
                                                menu-alignment="right"
                                                alternative-text="Actions"
                                                data-id={config.Id}
                                                onselect={handleRowMenu}
                                            >
                                                <lightning-menu-item
                                                    value="edit"
                                                    label="Edit"
                                                ></lightning-menu-item>
                                                <lightning-menu-item
                                                    lwc:if={config.isActive}
                                                    value="deactivate"
                                                    label="Deactivate"
                                                ></lightning-menu-item>
                                                <lightning-menu-item
                                                    lwc:if={config.isInactive}
                                                    value="activate"
                                                    label="Activate"
                                                ></lightning-menu-item>
                                                <lightning-menu-item
                                                    value="delete"
                                                    label="Delete"
                                                ></lightning-menu-item>
                                            </lightning-button-menu>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template lwc:else>
                    <p class="empty-text">
                        No writeback rules yet. Click
                        <strong>Add Rule</strong> to map an Extole event to a
                        Salesforce field.
                    </p>
                </template>
            </template>
        </div>

        <div class="settings-card">
            <div class="settings-card-header">
                <div class="settings-card-title">
                    Event Log
                    <lightning-helptext
                        content="One row per writeback attempt. SUCCESS = field(s) updated. SKIPPED = no matching record or no active rule. FAILED = unhandled error. Logs auto-purge after 30 days."
                    ></lightning-helptext>
                </div>
                <div class="diag-header-actions">
                    <template lwc:if={confirmClearLogs}>
                        <span class="confirm-clear-label"
                            >Clear all log entries?</span
                        >
                        <lightning-button
                            label="Yes, clear"
                            variant="destructive"
                            onclick={handleConfirmClearLogs}
                            disabled={isClearingLogs}
                        ></lightning-button>
                        <lightning-button
                            label="Cancel"
                            variant="neutral"
                            onclick={handleCancelClearLogs}
                        ></lightning-button>
                    </template>
                    <template lwc:else>
                        <lightning-button
                            label="Refresh"
                            variant="neutral"
                            icon-name="utility:refresh"
                            onclick={handleRefreshLogs}
                        ></lightning-button>
                        <lightning-button
                            label="Copy as Markdown"
                            variant="neutral"
                            icon-name="utility:copy"
                            onclick={handleCopyEventLogMd}
                        ></lightning-button>
                        <lightning-button
                            label="Clear Log"
                            variant="destructive-text"
                            onclick={handleClearLogs}
                            disabled={isClearingLogs}
                        ></lightning-button>
                    </template>
                </div>
            </div>
            <template lwc:if={isLoadingLogs}>
                <lightning-spinner
                    size="small"
                    alternative-text="Loading..."
                ></lightning-spinner>
            </template>
            <template lwc:else>
                <template lwc:if={hasLogs}>
                    <div class="table-wrapper">
                        <table
                            class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped"
                        >
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">Received</th>
                                    <th scope="col">Event</th>
                                    <th scope="col">Email</th>
                                    <th scope="col">Object</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">SFDC Record</th>
                                    <th scope="col">Reason</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={logs} for:item="log">
                                    <tr key={log.Id}>
                                        <td class="timestamp-cell">
                                            {log.formattedReceivedAt}
                                        </td>
                                        <td>{log.Event_Name__c}</td>
                                        <td>{log.Email__c}</td>
                                        <td>{log.Object_Type__c}</td>
                                        <td>
                                            <span class={log.statusBadgeClass}
                                                >{log.Status__c}</span
                                            >
                                        </td>
                                        <td
                                            class="record-id-cell"
                                            title={log.Record_Id__c}
                                        >
                                            <template lwc:if={log.recordUrl}>
                                                <a
                                                    href={log.recordUrl}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    >{log.shortRecordId}</a
                                                >
                                            </template>
                                            <template lwc:else
                                                >{log.shortRecordId}</template
                                            >
                                        </td>
                                        <td
                                            class={log.reasonClass}
                                            title={log.Error__c}
                                        >
                                            {log.errorPreview}
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template lwc:else>
                    <p class="empty-text">
                        No events received yet. Logs appear here when Extole
                        posts to the webhook endpoint.
                    </p>
                </template>
            </template>
        </div>
    </div>

    <template lwc:if={isModalOpen}>
        <section
            role="dialog"
            tabindex="-1"
            class="slds-modal slds-fade-in-open"
            aria-modal="true"
            aria-labelledby="wb-modal-heading"
        >
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button
                        class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                        onclick={handleCloseModal}
                    >
                        <lightning-icon
                            icon-name="utility:close"
                            size="small"
                            alternative-text="Close"
                        ></lightning-icon>
                    </button>
                    <h2 id="wb-modal-heading" class="slds-modal__title">
                        {modalTitle}
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input
                        type="text"
                        label="Event Name"
                        value={editingConfig.Event_Name__c}
                        data-field="Event_Name__c"
                        placeholder="e.g. reward_earned"
                        field-level-help="The Extole event_name value this rule applies to (e.g. reward_earned, share_link_clicked)."
                        onchange={handleFieldChange}
                        required
                    ></lightning-input>

                    <lightning-combobox
                        label="Salesforce Object"
                        value={editingConfig.Object_Type__c}
                        options={objectTypeOptions}
                        data-field="Object_Type__c"
                        field-level-help="Which Salesforce object to look up and update when this event arrives."
                        onchange={handleFieldChange}
                        required
                    ></lightning-combobox>

                    <lightning-combobox
                        label="Status"
                        value={editingConfig.Status__c}
                        options={statusOptions}
                        data-field="Status__c"
                        onchange={handleFieldChange}
                    ></lightning-combobox>

                    <lightning-textarea
                        label="Description"
                        value={editingConfig.Description__c}
                        data-field="Description__c"
                        max-length="255"
                        onchange={handleFieldChange}
                    ></lightning-textarea>

                    <div class="mapping-section">
                        <div class="mapping-section-header">
                            <span class="mapping-section-label"
                                >Field Mappings</span
                            >
                            <lightning-helptext
                                content="Each row reads a key from the Extole event's data object and writes its value to a Salesforce field on the matched record."
                            ></lightning-helptext>
                        </div>
                        <template for:each={mappingRows} for:item="row">
                            <div key={row.rowId} class="mapping-row">
                                <lightning-input
                                    type="text"
                                    label="Extole Key"
                                    value={row.extoleKey}
                                    data-row-id={row.rowId}
                                    data-col="extoleKey"
                                    placeholder="e.g. value"
                                    variant="label-hidden"
                                    onchange={handleMappingChange}
                                ></lightning-input>
                                <span class="mapping-arrow">→</span>
                                <lightning-input
                                    type="text"
                                    label="SFDC Field API Name"
                                    value={row.sfdcField}
                                    data-row-id={row.rowId}
                                    data-col="sfdcField"
                                    placeholder="e.g. Extole_Reward_Value__c"
                                    variant="label-hidden"
                                    onchange={handleMappingChange}
                                ></lightning-input>
                                <lightning-button-icon
                                    icon-name="utility:delete"
                                    variant="bare"
                                    size="small"
                                    alternative-text="Remove row"
                                    data-row-id={row.rowId}
                                    onclick={handleRemoveMapping}
                                ></lightning-button-icon>
                            </div>
                        </template>
                        <div class="mapping-add-row">
                            <lightning-button
                                label="Add Field Mapping"
                                variant="neutral"
                                icon-name="utility:add"
                                onclick={handleAddMapping}
                            ></lightning-button>
                        </div>
                    </div>

                    <template lwc:if={modalError}>
                        <div class="form-error">{modalError}</div>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        variant="neutral"
                        onclick={handleCloseModal}
                    ></lightning-button>
                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handleSaveModal}
                        disabled={isSaving}
                    ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
